[project]
id = "rabbitos"

[functions.ingest-sensor-data]
enabled = true

[functions.ai-router]
enabled = true

# NOAA poller runs every 15 minutes
[functions.noaa-poller]
enabled = true
schedule = "*/15 * * * *"

[functions.eeg-processor]
enabled = true

# eth-anchor polls Etherscan every 5 minutes for new contract transactions
[functions.eth-anchor]
enabled = true
schedule = "*/5 * * * *"

# data-lifecycle runs daily at 02:00 UTC — archives rows older than HOT_TIER_DAYS to GCS
[functions.data-lifecycle]
enabled = true
schedule = "0 2 * * *"

[functions.bio-fusion]
enabled = true

[functions.embed-telemetry]
enabled = true

[functions.semantic-search]
enabled = true
