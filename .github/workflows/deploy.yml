name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: intense-xray-v5xj8
  REGION: us-west2
  SERVICE: rabbit-software
  IMAGE: us-west2-docker.pkg.dev/intense-xray-v5xj8/rabbit-software/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-west2-docker.pkg.dev

      - name: Build and push
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_SUPABASE_ANON_KEY }} \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:${{ github.sha }} \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080
