global:
  env: prod
  imageRegistry: ""
  imagePullSecrets: []

image:
  repository: rabbitos
  tag: latest
  pullPolicy: IfNotPresent

gateway:
  replicaCount: 2
  port: 8080
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  autoscaling:
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

orchestrator:
  replicaCount: 2
  port: 8081
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 4Gi }

worker:
  replicaCount: 3
  resources:
    requests: { cpu: 1000m, memory: 2Gi }
    limits:   { cpu: 4000m, memory: 8Gi }
  autoscaling:
    minReplicas: 2
    maxReplicas: 50
    targetCPUUtilizationPercentage: 60

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  host: api.rabbitos.io
  tlsSecretName: rabbitos-tls

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""   # set via --set or values-prod.yaml

kafka:
  brokers: kafka:9092
  topicTasks: rabbitos.tasks
  topicResults: rabbitos.results

qdrant:
  url: http://qdrant:6333
  collection: rabbitos_memory

neo4j:
  uri: bolt://neo4j:7687

env:
  LLM_PROVIDER: deepseek
  LOG_LEVEL: INFO
  WORKER_CONCURRENCY: "4"
