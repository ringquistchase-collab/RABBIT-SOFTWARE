apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitos-gateway
  labels: { app: rabbitos-gateway }
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels: { app: rabbitos-gateway }
  template:
    metadata:
      labels: { app: rabbitos-gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.gateway.port }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rabbitos-gateway
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}-gateway:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          envFrom:
            - secretRef: { name: rabbitos-secrets }
          env:
            - name: LLM_PROVIDER
              value: {{ .Values.env.LLM_PROVIDER | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
          resources: {{ toYaml .Values.gateway.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: {{ .Values.gateway.port }} }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /ready, port: {{ .Values.gateway.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitos-gateway
spec:
  selector: { app: rabbitos-gateway }
  ports:
    - port: 80
      targetPort: {{ .Values.gateway.port }}
  type: ClusterIP
